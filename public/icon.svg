  <path d="M0 726 C 190 668, 360 686, 512 724 C 700 770, 880 726, 1024 704" stroke="#FFFFFF" stroke-width="6" opacity="0.30" fill="none"/>

  <path d="M0 832 C 200 782, 360 802, 512 836 C 700 876, 880 838, 1024 818 L1024 1024 L0 1024 Z" fill="#CFEBF5"/>
  <path d="M0 832 C 200 782, 360 802, 512 836 C 700 876, 880 838, 1024 818" stroke="#FFFFFF" stroke-width="6" opacity="0.55" fill="none"/>
</svg>
